<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messka — вход / регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .tab-header {
            display: flex;
            border-bottom: 2px solid #e9ecef;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            background: #f8f9fa;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: white;
            border-bottom: 2px solid #667eea;
            color: #667eea;
        }
        .tab-pane {
            display: none;
            padding: 25px;
        }
        .tab-pane.active {
            display: block;
        }
        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
        }
        .avatar-option.selected {
            border-color: #28a745;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="tab-header">
            <div class="tab-btn active" onclick="switchTab('login')">Вход</div>
            <div class="tab-btn" onclick="switchTab('register')">Регистрация</div>
        </div>
        
        <!-- Вкладка входа -->
        <div id="loginTab" class="tab-pane active">
            <h3 class="text-center mb-4">Вход в аккаунт</h3>
            <div class="mb-3">
                <label class="form-label">Имя пользователя</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="username">
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="******">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Войти</button>
            <div id="loginError" class="text-danger mt-2 text-center"></div>
        </div>
        
        <!-- Вкладка регистрации -->
        <div id="registerTab" class="tab-pane">
            <h3 class="text-center mb-4">Регистрация</h3>
            <div class="mb-3">
                <label class="form-label">Отображаемое имя</label>
                <input type="text" id="regName" class="form-control" placeholder="Как вас зовут?">
            </div>
            <div class="mb-3">
                <label class="form-label">Юзернейм (уникальный)</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" id="regTag" class="form-control" placeholder="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" id="regPassword" class="form-control" placeholder="******">
            </div>
            <div class="mb-3">
                <label class="form-label">Аватарка</label>
                <div id="avatarGrid">
                    <div class="avatar-option selected" onclick="selectAvatar('default', this)">M</div>
                    <div class="avatar-option" onclick="selectAvatar('fa-solid fa-cat', this)">🐱</div>
                    <div class="avatar-option" onclick="selectAvatar('fa-solid fa-dog', this)">🐶</div>
                    <div class="avatar-option" onclick="selectAvatar('fa-solid fa-robot', this)">🤖</div>
                    <div class="avatar-option" onclick="selectAvatar('fa-solid fa-star', this)">⭐</div>
                </div>
            </div>
            <button class="btn btn-success w-100" onclick="register()">Зарегистрироваться</button>
            <div id="regError" class="text-danger mt-2 text-center"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentAvatar = 'default';
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab-btn').classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerTab').classList.add('active');
            }
        }
        
        function selectAvatar(avatar, el) {
            currentAvatar = avatar;
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            el.classList.add('selected');
        }
        
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) {
                document.getElementById('loginError').textContent = 'Заполните все поля';
                return;
            }
            socket.emit('login', { username, password });
        }
        
        function register() {
            const name = document.getElementById('regName').value.trim();
            const tag = document.getElementById('regTag').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!name || !tag || !password) {
                document.getElementById('regError').textContent = 'Заполните все поля';
                return;
            }
            socket.emit('register', { username: name, tag: tag, password: password, avatar: currentAvatar });
        }
        
        socket.on('login_success', (data) => {
            localStorage.setItem('messka_user', JSON.stringify(data.user));
            alert('Вход выполнен!');
            window.location.href = '/chat';
        });
        
        socket.on('login_error', (data) => {
            document.getElementById('loginError').textContent = data.error;
        });
        
        socket.on('register_success', (data) => {
            localStorage.setItem('messka_user', JSON.stringify(data.user));
            alert('Регистрация успешна!');
            window.location.href = '/chat';
        });
        
        socket.on('register_error', (data) => {
            document.getElementById('regError').textContent = data.error;
        });
    </script>
</body>
</html>
